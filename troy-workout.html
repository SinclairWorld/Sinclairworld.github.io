  .header-banner { background: var(--purple-soft); border: 1px solid rgba(168,85,247,0.3); border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #c084fc; line-height: 1.5; }

  .ex-name { font-weight: 600; font-size: 14px; color: var(--text); }

  .ex-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .tag { font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.05); padding: 2px 7px; border-radius: 20px; }
  .ex-note { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .how-btn { background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; cursor: pointer; font-size: 11px; color: var(--muted); flex-shrink: 0; font-family: 'Barlow', sans-serif; font-weight: 600; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; }

  .week-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; }
  .week-day { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; color: var(--muted); min-width: 36px; letter-spacing: 1px; }
  .week-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .week-workout { font-weight: 600; font-size: 13px; }
  .week-label { font-size: 11px; color: var(--muted); }

  .prog-row { display: flex; gap: 12px; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
  .prog-badge { background: var(--purple); border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 700; color: #fff; height: fit-content; white-space: nowrap; }
  .prog-title { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 3px; }
  .prog-note { font-size: 12px; color: var(--muted); }
  .pos-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
  .pos-name { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 4px; }
  .pos-desc { font-size: 13px; color: var(--muted); }
  .info-block { border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .info-title { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 2px; margin-bottom: 8px; }
  .info-line { font-size: 13px; color: #c0c0c0; margin-bottom: 7px; line-height: 1.5; }
  .border-left { padding-left: 12px; border-left-width: 2px; border-left-style: solid; }
  .rec-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }

  /* install tip */

</style>

let activeDay = 0;
let checkedMap = JSON.parse(localStorage.getItem('checkedMap')||'{}');

function saveChecked(){ localStorage.setItem('checkedMap', JSON.stringify(checkedMap)); }

function ytURL(s){ return 'https://www.youtube.com/results?search_query='+encodeURIComponent(s+' exercise how to'); }

function renderExercise(ex, prefix){
  const key = prefix+'__'+ex.name;
  const isDone = !!checkedMap[key];
  return `<div class="ex-row${isDone?' done':''}" id="row-${CSS.escape(key)}">
    <div class="ex-inner">
      <div class="ex-check${isDone?' checked':''}" onclick="toggleCheck('${key.replace(/'/g,"\\'")}')">
        ${isDone?'✓':''}
      </div>
      <div class="ex-body">
        <div class="ex-name${ex.priority?' priority':''}${isDone?' done-text':''}">${ex.name}</div>
        <div class="ex-tags">
          ${ex.sets?`<span class="tag">${ex.sets} × ${ex.reps}</span>`:''}
          ${ex.weight?`<span class="tag">${ex.weight}</span>`:''}
        </div>
        <div class="ex-note">${(ex.note||'').replace(/^🔑 /,'')}</div>
      </div>
      <button class="how-btn" onclick="openModal(${JSON.stringify(JSON.stringify(ex))})">HOW?</button>
    </div>
  </div>`;
}

function toggleCheck(key){
  checkedMap[key] = !checkedMap[key];
  saveChecked();
  showTab('workout', document.querySelector('.nav-btn.active'));
}

function openModal(exJson){
  const ex = JSON.parse(exJson);
  const img = IMAGES[ex.imageKey];
  let html = `<div class="modal-header">
    <div class="modal-title">${ex.name}</div>
    <button class="modal-close" onclick="document.getElementById('modal').classList.add('hidden')">Close</button>
  </div>`;
  if(img) html += `<img class="modal-img" src="${img}" alt="${ex.name}" onerror="this.style.display='none'">`;
  html += `<a class="yt-link" href="${ytURL(ex.ytSearch||ex.youtubeSearch||ex.name)}" target="_blank">
    <span class="yt-icon">▶</span>
    <div><div class="yt-title">Watch Video Demo on YouTube</div><div class="yt-sub">Tap to see exactly how to perform this</div></div>
  </a>
  <div class="slabel">STEP BY STEP</div>`;
  (ex.howTo||[]).forEach((s,i)=>{
    html += `<div class="step-row"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`;
  });
  if(ex.note) html += `<div class="note-box">${ex.note}</div>`;
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal(e){
  if(e.target === document.getElementById('modal'))
    document.getElementById('modal').classList.add('hidden');
}
